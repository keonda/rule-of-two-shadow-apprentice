version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: shadow_apprentice_db
    restart: always
    environment:
      POSTGRES_USER: shadow_apprentice
      POSTGRES_PASSWORD: shadow_password
      POSTGRES_DB: shadow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shadow_apprentice_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://shadow_apprentice:shadow_password@db:5432/shadow_db?schema=public
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NEXTAUTH_SECRET=super_secret_for_shadow_apprentice_12345
      - NEXT_PUBLIC_APP_NAME=Rule of Two: Shadow Apprentice
    depends_on:
      - db

volumes:
  postgres_data:
